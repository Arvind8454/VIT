{% extends "base.html" %}
{% block title %}Dashboard - ViT Explainable AI Project{% endblock %}
{% block content %}
<section class="page-card">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">
        <div>
            <h1 class="text-2xl md:text-3xl font-bold text-slate-900">AI Image Dashboard</h1>
            <p class="mt-2 text-slate-600">Hello, <strong>{{ username }}</strong>. Upload an image and inspect predictions with explainability overlays.</p>
        </div>
    </div>
    <div class="rounded-xl overflow-hidden border border-slate-200 shadow-sm">
        <iframe
            src="{{ streamlit_embed_url }}/?user={{ username|urlencode }}&email={{ user_email|default('', true)|urlencode }}"
            class="w-full min-h-[78vh] md:min-h-[84vh]"
            frameborder="0"
            title="Streamlit Dashboard"
            allow="camera; microphone; autoplay"
        ></iframe>
    </div>
</section>
{% endblock %}
