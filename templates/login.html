{% extends "base.html" %}
{% block title %}Login - ViT Explainable AI Project{% endblock %}
{% block content %}
<section class="max-w-lg mx-auto page-card">
    <h1 class="text-2xl md:text-3xl font-bold text-slate-900">Login</h1>
    <p class="mt-2 text-slate-600">Access your dashboard to start image recognition and explainability.</p>
    <form id="login-form" action="{{ url_for('login') }}" method="post" class="mt-6 grid gap-5" novalidate>
        <div>
            <label for="email" class="form-label">Email Address</label>
            <input id="email" name="email" type="email" class="form-input" autocomplete="email" placeholder="Enter your email address" required>
        </div>
        <div>
            <label for="password" class="form-label">Password</label>
            <input id="password" name="password" type="password" class="form-input" autocomplete="current-password" placeholder="Enter your password" required>
        </div>
        <button id="login-submit" type="submit" class="btn-primary w-full">Log In</button>
    </form>
    <p class="mt-5 text-sm text-slate-600">New here? <a class="text-primary font-semibold hover:underline" href="{{ url_for('signup') }}">Create an account</a></p>
</section>
{% endblock %}
